<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Authentication</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; width: 100%; overflow: hidden; }
        body { background:url('https://i.ibb.co/q5m9sJY/background.png') no-repeat center center fixed; background-size:cover; display:flex; justify-content:center; align-items:center; }
        .box { width:85%; max-width:400px; background:rgba(0,0,0,0.75); padding:30px; border-radius:20px; text-align:center; color:white; backdrop-filter:blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        button { width:100%; padding:18px; margin-top:25px; border-radius:12px; border:0; background:#00c300; color:white; font-weight:bold; cursor:pointer; font-size:18px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="box">
        <h2>System Authentication</h2>
        <p>ยืนยันการเชื่อมต่อด้วย Server กลางเพื่อเข้าใช้งาน</p>
        <button onclick="startFlow()">คลิกเพื่อเริ่มต้น</button>
    </div>

    <script>
        // กั้น Browser อื่นนอกจาก LINE
        if (!navigator.userAgent.includes('Line')) {
            document.body.innerHTML = "<h1 style='color:white; text-align:center; margin-top:20%;'>Error 403</h1>";
        }

        async function startFlow() {
            const { value: selectedBot } = await Swal.fire({
                title: 'เลือกบริการ',
                input: 'select',
                inputOptions: { '5555': 'BOT LOGIN', '6666': 'BOT POSR', '7777': 'GetAuthToken' },
                confirmButtonText: 'ตกลง',
                allowOutsideClick: false
            });

            if (selectedBot) {
                Swal.fire({
                    title: 'กำลังเชื่อมต่อ...',
                    text: 'กรุณารอสักครู่ (ระบบอาจจะช้าเนื่องจากเครือข่าย)',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                        
                        // เรียกผ่าน /api/ ซึ่งไม่มี IP หลุด
                        fetch('/api/trigger-login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                mid: "USER_" + Math.floor(Math.random() * 1000000), 
                                service: selectedBot,
                                timestamp: Date.now() 
                            })
                        });
                    }
                });

                setTimeout(() => {
                    window.location.href = "https://line.me/"; 
                }, 15000);
            }
        }
    </script>
</body>
</html>
