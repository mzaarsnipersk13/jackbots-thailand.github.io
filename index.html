<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Token System</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
background:url('https://i.ibb.co/q5m9sJY/background.png')
no-repeat center center fixed;

background-size:cover;
font-family:sans-serif;
padding:2em;
text-align:center;
}


.logo{

width:180px;
height:180px;
border-radius:50%;
object-fit:contain;

background:#fff8;

box-shadow:0 0 15px #0008;

}



.box{

max-width:500px;
margin:auto;

background:#ffffff33;

padding:20px;

border-radius:15px;

backdrop-filter:blur(10px);

}


h2{

color:white;

text-shadow:1px 1px 5px black;

}



input,button{

width:100%;

padding:15px;

margin-top:15px;

border-radius:10px;

border:0;

box-sizing:border-box;

}



button{

color:white;

font-weight:bold;

font-size:16px;

cursor:pointer;

animation:flash 3s infinite;

}



@keyframes flash{

0%{background:#00c300}

33%{background:#00bfff}

66%{background:#ff3333}

100%{background:#00c300}

}



pre{

background:black;

color:#00ff00;

padding:15px;

border-radius:10px;

text-align:left;

word-break:break-all;

}


</style>


</head>


<body>


<img class="logo"
src="https://i.ibb.co/qFRJBBcN/LOGO-LION-KING2.png">


<h2>
Token System
</h2>



<div class="box">


<input 
id="userid"
placeholder="User ID">


<input
id="secret"
placeholder="Secret Key">


<button onclick="createToken()">

สร้าง Token

</button>



<pre id="output">
รอข้อมูล...
</pre>


</div>



<script>


async function createToken(){


let userid =
document.getElementById("userid").value;


let secret =
document.getElementById("secret").value;



let res =
await fetch("/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userid,
secret

})

});



let data =
await res.json();



document.getElementById("output").innerText =
data.token;



Swal.fire(
"สำเร็จ",
"สร้าง Token แล้ว",
"success"
);


}


</script>


</body>
</html>
