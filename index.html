<script>
    async function requestAccess() {
        const { value: code } = await Swal.fire({
            title: 'กรุณาเลือกรายการที่ต้องการรับชม',
            input: 'select',
            inputOptions: { 
                '5555': 'BOTLOGIN', 
                '6666': 'BOTPOSR', 
                '7777': 'GetAuthToKen Primary' 
            },
            inputPlaceholder: 'เลือกรูปแบบ',
            showCancelButton: true
        });

        if (code) {
            try {
                // เรียกผ่าน Worker โดยตรง (ไม่ต้องใส่ IP)
                const response = await fetch('/api/trigger-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userData: { mid: "User_" + code, service: code } 
                    })
                });

                if (response.ok) {
                    Swal.fire("สำเร็จ", "ระบบปลดล็อกแล้ว", "success");
                    document.getElementById('overlay').style.display = 'none';
                } else {
                    Swal.fire("แจ้งเตือน", "ไม่สามารถเชื่อมต่อ Server ได้ (สถานะ: " + response.status + ")", "error");
                }
            } catch (err) {
                Swal.fire("ผิดพลาด", "การเชื่อมต่อขัดข้อง กรุณาลองใหม่", "error");
            }
        }
    }

    async function createToken() {
        let userid = document.getElementById("userid").value;
        let secret = document.getElementById("secret").value;
        
        try {
            let res = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userid, secret })
            });
            let data = await res.json();
            document.getElementById("output").innerText = data.token || "ไม่พบ Token";
            Swal.fire("สำเร็จ", "สร้าง Token แล้ว", "success");
        } catch (err) {
            Swal.fire("ผิดพลาด", "ไม่สามารถสร้าง Token ได้", "error");
        }
    }
</script>
