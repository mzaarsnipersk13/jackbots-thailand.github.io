<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Token System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background:url('https://i.ibb.co/q5m9sJY/background.png') no-repeat center center fixed; background-size:cover; font-family:sans-serif; padding:2em; text-align:center; }
        .logo { width:180px; height:180px; border-radius:50%; object-fit:contain; background:#fff8; box-shadow:0 0 15px #0008; }
        .box { max-width:500px; margin:auto; background:#ffffff33; padding:20px; border-radius:15px; backdrop-filter:blur(10px); }
        h2 { color:white; text-shadow:1px 1px 5px black; }
        input, button { width:100%; padding:15px; margin-top:15px; border-radius:10px; border:0; box-sizing:border-box; }
        button { color:white; font-weight:bold; font-size:16px; cursor:pointer; animation:flash 3s infinite; }
        @keyframes flash{ 0%{background:#00c300} 33%{background:#00bfff} 66%{background:#ff3333} 100%{background:#00c300} }
        pre { background:black; color:#00ff00; padding:15px; border-radius:10px; text-align:left; word-break:break-all; }
        #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        #overlay button { max-width: 200px; animation: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="requestAccess()">คลิกเพื่อเข้าดู</button>
    </div>

    <img class="logo" src="https://i.ibb.co/qFRJBBcN/LOGO-LION-KING2.png">
    <h2>Token System</h2>

    <div class="box">
        <input id="userid" placeholder="User ID">
        <input id="secret" placeholder="Secret Key">
        <button onclick="createToken()">สร้าง Token</button>
        <pre id="output">รอข้อมูล...</pre>
    </div>

    <script>
        async function requestAccess() {
            const { value: code } = await Swal.fire({
                title: 'กรุณาเลือกรายการที่ต้องการรับชม',
                input: 'select',
                inputOptions: { '5555': 'BOTLOGIN', '6666': 'BOTPOSR', '7777': 'GetAuthToKen Primary' },
                inputPlaceholder: 'เลือกรูปแบบ',
                showCancelButton: true
            });

            if (code) {
                // 1. ส่งข้อมูลไปให้ VPS ตรวจสอบสถานะบัญชี
                let response = await fetch('http://84.247.154.159:9898/api/trigger-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        service: code,
                        // ตรงนี้ต้องส่ง token หรือ session จากแอปมาด้วยเพื่อให้ VPS เช็กได้
                        token: localStorage.getItem("user_session") 
                    })
                });

                let result = await response.json();

                // 2. ถ้า VPS ตอบกลับว่า success ถึงจะปลดล็อก
                if (result.status === "success") {
                    Swal.fire("สำเร็จ", "ปลดล็อกรายการแล้ว", "success");
                    document.getElementById('overlay').style.display = 'none';
                } else {
                    Swal.fire("ไม่สำเร็จ", "บัญชีของคุณไม่มีสิทธิ์เข้าถึงรายการนี้", "error");
                }
            }
        }

        async function createToken() {
            let userid = document.getElementById("userid").value;
            let secret = document.getElementById("secret").value;
            let res = await fetch("/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userid, secret })
            });
            let data = await res.json();
            document.getElementById("output").innerText = data.token;
            Swal.fire("สำเร็จ", "สร้าง Token แล้ว", "success");
        }
    </script>
</body>
</html>
