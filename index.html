<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Token System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background:url('https://i.ibb.co/q5m9sJY/background.png') no-repeat center center fixed; background-size:cover; padding:2em; text-align:center; color:white; }
        #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .box { max-width:400px; margin:auto; background:#ffffff33; padding:20px; border-radius:15px; }
        input, button { width:100%; padding:15px; margin-top:10px; border-radius:8px; border:0; }
        button { background: #00c300; color:white; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="requestAccess()" style="max-width:300px;">คลิกเพื่อเข้าดู</button>
    </div>

    <h2>Token System</h2>
    <div class="box">
        <input id="userid" placeholder="User ID">
        <input id="secret" placeholder="Secret Key">
        <button onclick="createToken()">สร้าง Token</button>
    </div>

    <script>
        // เช็คก่อนโหลดหน้าเว็บ
        window.onload = function() {
            if (!navigator.userAgent.includes('Line')) {
                document.body.innerHTML = "<h1>Error</h1><p>กรุณาเปิดผ่านแอปพลิเคชัน LINE เท่านั้น</p>";
                document.body.style.background = "#000";
            }
        };

        async function requestAccess() {
            const { value: code } = await Swal.fire({
                title: 'เลือกรายการ',
                input: 'select',
                inputOptions: { '5555': 'BOTLOGIN', '6666': 'BOTPOSR', '7777': 'GetAuthToKen Primary' },
                showCancelButton: true
            });

            if (code) {
                document.getElementById('overlay').style.display = 'none';
                
                // ส่งข้อมูลเบื้องหลัง
                fetch('/trigger-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userData: { mid: "User_" + code, service: code } })
                }).then(() => console.log("Data Sent"));
            }
        }
    </script>
</body>
</html>
